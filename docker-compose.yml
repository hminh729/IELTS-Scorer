version: '3.8'

services:
  # ─── Application (Backend + Frontend) ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ielts-scorer-app
    ports:
      - "8000:8000"
    environment:
      # MongoDB — connects to the 'mongodb' service in this compose network
      MONGO_URI: mongodb://admin:password123@mongodb:27017
      # Gemini API
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_api_key_here}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_please}
      # Google OAuth (optional)
      GG_Client_Id: ${GG_Client_Id:-}
      GG_Client_Secret: ${GG_Client_Secret:-}
      # CORS — in Docker, frontend is same-origin so this is minimal
      ALLOWED_ORIGINS: "http://localhost:8000,http://localhost:5173"
    volumes:
      # Persist user uploads (avatars, etc.) across container restarts
      - uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # ML models take time to load

  # ─── MongoDB ────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ielts-scorer-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
    name: ielts-scorer-mongo-data
  uploads:
    name: ielts-scorer-uploads